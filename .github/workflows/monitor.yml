name: Monitor Polymarket Deportes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: polymarket-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Restaurar estado (cache + seen)
        uses: actions/cache/restore@v4
        with:
          path: |
            sport_cache.json
            seen_trades.json
          key: polymarket-state-${{ github.run_id }}
          restore-keys: |
            polymarket-state-

      - name: Ejecutar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WALLETS_EXTRA: ${{ secrets.WALLETS_EXTRA }}
          TOP_N: "25"
          LEADERBOARD_WINDOW: "7d"
          WINDOW_MINUTES: "6"
        run: python monitor.py

      - name: Guardar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            sport_cache.json
            seen_trades.json
          key: polymarket-state-${{ github.run_id }}
          
