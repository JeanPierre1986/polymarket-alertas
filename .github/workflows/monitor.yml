name: Monitor Polymarket Deportes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: polymarket-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Restaurar estado (cache + seen)
        uses: actions/cache/restore@v4
        with:
          path: |
            sport_cache.json
            seen_trades.json
          key: polymarket-state-${{ github.run_id }}
          restore-keys: |
            polymarket-state-

      - name: Ejecutar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WALLETS_EXTRA: ${{ secrets.WALLETS_EXTRA }}
          TOP_N: "25"
          LEADERBOARD_WINDOW: "7d"
          WINDOW_MINUTES: "6"
          # --- nuevo en v6.0 ---
          MIN_USD: "250"          # baja o sube segun cuanto ruido quieras filtrar
          MIN_PRICE: "0"          # ej: "0.15" para ignorar mercados casi resueltos
          MAX_PRICE: "1"          # ej: "0.85" idem del otro lado
          RANK_BY_ROI: "false"    # dejar en false hasta confirmar el campo de volumen (ver debug_print_leaderboard_sample)
          MIN_TRADES_FOR_RANK: "0"
        run: python polymarket_sports_monitor_v6.py

      - name: Guardar estado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            sport_cache.json
            seen_trades.json
          key: polymarket-state-${{ github.run_id }}
          
